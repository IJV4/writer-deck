display_model: epd7in5_V2
font_family: Hack
font_size: 14
daily_goal_words: 500
partial_refresh_max_streak: 5
render_interval_ms: 500
idle_full_refresh_seconds: 10
full_refresh_max_seconds: 300  # wall-clock backstop: force a full refresh at least this often
display_sleep_minutes: 5
display_idle_sleep_seconds: 20  # deep-sleep the panel after this many seconds of no keystroke
display_screensaver_seconds: 1800  # LONG-3: blank to a white "paused" frame before long-idle deep sleep (0 = disabled)
keyboard_device: auto
keyboard_input: auto  # auto | stdin | evdev | pygame
mode_order:
  - distraction_free
  - dashboard
  - typewriter
documents_dir: ~/Documents/writer-deck
autosave_interval_seconds: 90
battery_warning_percent: 15
battery_shutdown_percent: 3
enable_battery_monitor: true
pisugar_socket: /tmp/pisugar-server.sock
log_dir: ~/.config/writer-deck/logs
show_title_bar: true
default_format: txt
idle_deep_clean_seconds: 300  # GC16 clean after this many idle seconds (0 = disabled)
sleep_tiers:
  display_off_minutes: 5
  cpu_powersave_minutes: 15
  system_suspend_minutes: 30
